[package]
  cjc-version = "1.1.0"
  name = "benchmark"
  description = "benchmark stdjson2 against other json decoders"
  version = "1.0.0"
  target-dir = ""
  output-type = "executable"
  compile-option = "--disable-reflection --static-std -O2"
  override-compile-option = "--disable-reflection --static-std -O2"
  link-option = "-s"
  package-configuration = {}

[dependencies]
  seajson = { path = "dependencies/seajson", output-type = "static" }
  stdjson = { path = "dependencies/stdjson", output-type = "static" }
  stdjson2 = { path = "../", output-type = "static" }

[target.aarch64-unknown-linux-gnu]
  compile-option = "--static"

[target.x86_64-unknown-linux-gnu]
  compile-option = "--static"

[target.aarch64-apple-darwin]
  compile-option = "--static"
